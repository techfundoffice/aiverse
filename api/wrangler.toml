name = "minimax-aiverse"
main = "src/index.ts"
compatibility_date = "2024-09-25"

# Custom domain configuration
routes = [
  { pattern = "api.mattmarcusai.com", custom_domain = true }
]

# Environment variables (will be set via wrangler secret)
# SUPABASE_URL and SUPABASE_ANON_KEY will be added as secrets

[env.production]
name = "minimax-aiverse-prod"

[env.staging]
name = "minimax-aiverse-staging"
